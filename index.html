<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>每週任務清單 + 獎勵系統</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: linear-gradient(90deg,rgba(150, 206, 255, 0.603),rgba(255, 206, 255, 0.589));
      height: 100vh;
      color: black;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      font-size: 1.2em;
      border-bottom: 1px solid #444;
      background: linear-gradient(90deg,rgba(150, 206, 255, 0.603),rgba(255, 206, 255, 0.589));
    }
    .main-content {
      flex: 1;
      display: flex;
      gap: 40px;
      padding: 20px 30px;
    }
    .todo-container {
      flex: 2;
      display: flex;
      flex-direction: column;
    }
    #todo-list {
      flex-grow: 1;
      overflow-y: auto;
    }
    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .todo-item input[type="checkbox"] {
      transform: scale(1.3);
    }
    .todo-text {
      flex: 1;
      font-size: 1.1em;
      outline: none;
      border-bottom: 1px dashed #00000033;
      padding-bottom: 3px;
      word-break: break-word;
    }
    button.delete-btn {
      background: transparent;
      border: none;
      color: #e53935;
      font-size: 1.4em;
      cursor: pointer;
    }
    #add-button {
      margin: 10px auto 20px;
      padding: 10px 20px;
      font-size: 1em;
      background-color: hsl(215, 100%, 79%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 160px;
    }
    #add-button:hover {
      background-color: hsl(212, 100%, 79%);
    }
    .stats-container {
      flex: 1;
      border-left: 2px solid #00000033;
      padding-left: 20px;
    }
    .stat-box {
      margin-bottom: 15px;
      font-size: 1.1em;
    }
    .highlight {
      font-weight: bold;
      color: #000;
    }
    .money-controls button {
      margin-right: 10px;
      padding: 5px 10px;
      background-color: #ff0303;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>DATE：<span id="date"></span></div>
    <div>TIME：<span id="clock"></span></div>
  </div>

  <div class="main-content">
    <div class="todo-container">
      <h1>平野のTo-Do</h1>
      <button id="add-button">➕ 新增一項</button>
      <div id="todo-list"></div>
    </div>

    <div class="stats-container">
      <h2>統計</h2>
      <div class="stat-box">連勝週數：<span id="streak" class="highlight">0</span></div>
      <div class="stat-box">完成週數：<span id="weeks-done" class="highlight">0</span> / <span id="weeks-total" class="highlight">0</span></div>
      <div class="stat-box">總完成件數：<span id="total-done" class="highlight">0</span></div>
      <hr />
      <h2>獎勵</h2>
      <div class="stat-box">目前金額：<span id="money" class="highlight">$0</span></div>
      <div class="money-controls">
        <button onclick="spendMoney(50)">扣 50 元</button>
        <button onclick="spendMoney(100)">扣 100 元</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'weeklyChecklistData';
    const REWARD_AMOUNT = 500;

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      tasks: [],
      stats: {
        totalDone: 0,
        streak: 0,
        weeksDone: 0,
        weeksTotal: 0,
        lastClear: null,
        rewardedWeeks: [],
        money: 0,
      },
    };

    const list = document.getElementById('todo-list');
    const addBtn = document.getElementById('add-button');

    function formatDate(date = new Date()) {
      return date.toISOString().split('T')[0];
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function renderTasks() {
      list.innerHTML = '';
      data.tasks.forEach((task, i) => {
        const item = document.createElement('div');
        item.className = 'todo-item';
        item.innerHTML = `
          <input type="checkbox" ${task.checked ? 'checked' : ''} />
          <div class="todo-text" contenteditable="true">${task.text}</div>
          <button class="delete-btn">🗑️</button>
        `;
        const checkbox = item.querySelector('input[type="checkbox"]');
        const text = item.querySelector('.todo-text');
        const deleteBtn = item.querySelector('.delete-btn');

        checkbox.addEventListener('change', () => {
          task.checked = checkbox.checked;
          if (checkbox.checked) data.stats.totalDone += 1;
          save();
          updateStats();
        });
        text.addEventListener('input', () => {
          task.text = text.textContent;
          save();
        });
        deleteBtn.addEventListener('click', () => {
          data.tasks.splice(i, 1);
          save();
          renderTasks();
          updateStats();
        });

        list.appendChild(item);
      });
    }

    function addTask(text = '新增事項...') {
      data.tasks.push({ text, checked: false });
      save();
      renderTasks();
    }

    function updateStats() {
      document.getElementById('streak').textContent = data.stats.streak;
      document.getElementById('weeks-done').textContent = data.stats.weeksDone;
      document.getElementById('weeks-total').textContent = data.stats.weeksTotal;
      document.getElementById('total-done').textContent = data.stats.totalDone;
      document.getElementById('money').textContent = '$' + data.stats.money;
    }

    function checkNewWeekReset() {
      const now = new Date();
      const last = data.stats.lastClear ? new Date(data.stats.lastClear) : null;
      const isNewWeek = !last || now - last > 7 * 24 * 60 * 60 * 1000 || (now.getDay() === 0 && now.getHours() >= 5 && formatDate(now) !== formatDate(last));

      if (isNewWeek) {
        if (data.tasks.length && data.tasks.every((t) => t.checked)) {
          data.stats.streak += 1;
          data.stats.weeksDone += 1;
          if (!data.stats.rewardedWeeks.includes(data.stats.weeksDone)) {
            data.stats.money += REWARD_AMOUNT;
            data.stats.rewardedWeeks.push(data.stats.weeksDone);
            alert(`🎉 完成一整週任務！獲得 $${REWARD_AMOUNT} 獎勵！`);
          }
        } else {
          data.stats.streak = 0;
        }

        data.stats.weeksTotal += 1;
        data.tasks.forEach((t) => (t.checked = false));
        data.stats.lastClear = now.toISOString();
        save();
      }
    }

    function spendMoney(amount) {
      if (data.stats.money >= amount) {
        data.stats.money -= amount;
        save();
        updateStats();
      } else {
        alert('❌ 錢不夠喔');
      }
    }

    function updateDateTime() {
      const now = new Date();
      const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
      const timeStr = now.toLocaleTimeString('zh-TW');
      document.getElementById('date').textContent = dateStr;
      document.getElementById('clock').textContent = timeStr;
    }

    // 自動刷新邏輯（每分鐘檢查）
    setInterval(() => {
      const now = new Date();
      const today = formatDate(now);
      const lastRefresh = localStorage.getItem('lastWeekRefresh') || '';
      if (now.getDay() === 0 && now.getHours() === 5 && now.getMinutes() === 0 && lastRefresh !== today) {
        localStorage.setItem('lastWeekRefresh', today);
        location.reload();
      }
    }, 60000);

    // 初始化
    checkNewWeekReset();
    renderTasks();
    updateStats();
    updateDateTime();
    setInterval(updateDateTime, 1000);
    addBtn.addEventListener('click', () => addTask());
  </script>
</body>
</html>
